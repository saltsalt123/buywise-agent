services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./agent:/app/agent
      - ./ingestion:/app/ingestion
      - ./retrieval:/app/retrieval
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./data:/app/data
    command: python -m workers.celery_app worker --loglevel=info

  web:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./apps/web:/usr/share/nginx/html:ro
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: buywise
      POSTGRES_USER: buywise
      POSTGRES_PASSWORD: buywise
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buywise"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
