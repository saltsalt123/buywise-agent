<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" style="background:#020617;font-family:monospace">
  <defs>
    <pattern id="g" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#64748b"/>
    </marker>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="900" height="640" fill="url(#g)"/>

  <!-- Title -->
  <text x="450" y="24" fill="#f1f5f9" font-size="15" font-weight="bold" text-anchor="middle">BuyWise Agent MVP — Architecture</text>
  <text x="450" y="40" fill="#64748b" font-size="10" text-anchor="middle">LangGraph Multi-Agent · Warranty / Return Decision Engine</text>

  <!-- Connections -->
  <line x1="450" y1="52" x2="450" y2="88" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M 450 165 L 450 180 L 260 180 L 260 200" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="260" y1="280" x2="260" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M 260 385 L 260 410 L 450 410 L 450 385" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <path d="M 450 165 L 450 190 L 200 190 L 200 440 L 250 440" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="310" y="320" fill="#475569" font-size="8" text-anchor="middle">route by intent</text>
  <path d="M 450 165 L 450 440 L 450 440" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M 640 440 L 640 165 L 450 165" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="345" y1="518" x2="345" y2="555" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="450" y1="518" x2="450" y2="555" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="555" y1="518" x2="555" y2="555" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="450" y1="630" x2="450" y2="640" stroke="#34d399" stroke-width="1.5" marker-end="url(#ac)"/>

  <!-- User -->
  <rect x="400" y="56" width="100" height="30" rx="15" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="450" y="75" fill="#cbd5e1" font-size="11" font-weight="500" text-anchor="middle">👤 User Query</text>

  <!-- Supervisor -->
  <rect x="380" y="95" width="140" height="70" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="380" y="95" width="140" height="70" rx="10" fill="rgba(8,51,68,0.4)"/>
  <text x="450" y="122" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">Supervisor</text>
  <text x="450" y="140" fill="#64748b" font-size="9" text-anchor="middle">Classifies intent</text>
  <text x="450" y="154" fill="#64748b" font-size="8" text-anchor="middle">→ warranty / return</text>

  <!-- Data Layer label -->
  <rect x="42" y="200" width="50" height="14" rx="3" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="67" y="210" fill="#64748b" font-size="7" text-anchor="middle">DATA</text>

  <!-- Ingestion -->
  <rect x="185" y="205" width="150" height="75" rx="8" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <rect x="185" y="205" width="150" height="75" rx="8" fill="rgba(6,78,59,0.4)"/>
  <text x="260" y="232" fill="#34d399" font-size="11" font-weight="600" text-anchor="middle">📥 File Ingestion</text>
  <text x="260" y="250" fill="#64748b" font-size="8" text-anchor="middle">TXT · CSV · EML · HTML</text>
  <text x="260" y="266" fill="#475569" font-size="8" text-anchor="middle">Chunking + Indexing</text>

  <!-- Retrieval -->
  <rect x="185" y="315" width="150" height="75" rx="8" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <rect x="185" y="315" width="150" height="75" rx="8" fill="rgba(6,78,59,0.4)"/>
  <text x="260" y="342" fill="#34d399" font-size="11" font-weight="600" text-anchor="middle">🔍 Keyword Search</text>
  <text x="260" y="360" fill="#64748b" font-size="8" text-anchor="middle">BM25 + Doc-type Fallback</text>
  <text x="260" y="376" fill="#475569" font-size="8" text-anchor="middle">Evidence Retrieval</text>

  <!-- Agents label -->
  <rect x="42" y="450" width="56" height="14" rx="3" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="70" y="460" fill="#64748b" font-size="7" text-anchor="middle">AGENTS</text>

  <!-- Order Agent -->
  <rect x="255" y="443" width="180" height="75" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="255" y="443" width="180" height="75" rx="8" fill="rgba(76,29,149,0.4)"/>
  <text x="345" y="468" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">📦 Order Agent</text>
  <text x="345" y="486" fill="#64748b" font-size="8" text-anchor="middle">Purchase date · Amount</text>
  <text x="345" y="502" fill="#475569" font-size="8" text-anchor="middle">Extracts order facts</text>

  <!-- Policy Agent -->
  <rect x="360" y="443" width="180" height="75" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="360" y="443" width="180" height="75" rx="8" fill="rgba(76,29,149,0.4)"/>
  <text x="450" y="468" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">📋 Policy Agent</text>
  <text x="450" y="486" fill="#64748b" font-size="8" text-anchor="middle">Warranty terms · Exceptions</text>
  <text x="450" y="502" fill="#475569" font-size="8" text-anchor="middle">Analyses policy coverage</text>

  <!-- Verifier Agent -->
  <rect x="465" y="443" width="180" height="75" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="465" y="443" width="180" height="75" rx="8" fill="rgba(76,29,149,0.4)"/>
  <text x="555" y="468" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">✅ Verifier Agent</text>
  <text x="555" y="486" fill="#64748b" font-size="8" text-anchor="middle">Cross-checks evidence</text>
  <text x="555" y="502" fill="#475569" font-size="8" text-anchor="middle">Validates claims</text>

  <!-- Action label -->
  <rect x="42" y="560" width="56" height="14" rx="3" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="70" y="570" fill="#64748b" font-size="7" text-anchor="middle">ACTION</text>

  <!-- Action Agent -->
  <rect x="360" y="560" width="180" height="75" rx="8" fill="#0f172a" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="360" y="560" width="180" height="75" rx="8" fill="rgba(251,146,60,0.3)"/>
  <text x="450" y="585" fill="#fb923c" font-size="11" font-weight="600" text-anchor="middle">⚡ Action Agent</text>
  <text x="450" y="603" fill="#64748b" font-size="8" text-anchor="middle">Draft email · Checklist</text>
  <text x="450" y="619" fill="#475569" font-size="8" text-anchor="middle">Generates actionable outputs</text>

  <!-- Legend -->
  <rect x="690" y="560" width="180" height="65" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="700" y="576" fill="#64748b" font-size="8" font-weight="600">LEGEND</text>
  <rect x="700" y="584" width="16" height="6" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="722" y="590" fill="#94a3b8" font-size="7">Orchestration</text>
  <rect x="700" y="594" width="16" height="6" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="722" y="600" fill="#94a3b8" font-size="7">Data</text>
  <rect x="790" y="584" width="16" height="6" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="812" y="590" fill="#94a3b8" font-size="7">Agents</text>
  <rect x="790" y="594" width="16" height="6" rx="2" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="812" y="600" fill="#94a3b8" font-size="7">Action</text>

  <!-- Output -->
  <rect x="360" y="635" width="180" height="5" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
</svg>
